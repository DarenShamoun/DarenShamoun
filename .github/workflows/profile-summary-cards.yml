name: GitHub Profile Summary Cards

on:
  schedule:
    - cron: "0 12 * * 0"   # weekly, Sundays 12:00 UTC
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/profile-summary-cards.yml'

# never let two runs race to push (avoids spurious "failed" emails)
concurrency:
  group: profile-summary-cards
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate summary cards
    permissions:
      contents: write        # scoped to this workflow only, so it can commit the SVGs
    steps:
      - uses: actions/checkout@v4
      - uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}
          BRANCH_NAME: "main"
          THEME: "github_dark"
          UTC_OFFSET: -8
          AUTO_PUSH: true
